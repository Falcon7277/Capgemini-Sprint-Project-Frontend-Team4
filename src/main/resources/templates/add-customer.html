<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Customer</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --border: #e8e8e4;
            --text-primary: #1a1a18;
            --text-secondary: #6b6b66;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --radius: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
        }

        /* Top bar matching product source */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
        }

        .page-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0;
            line-height: 1;
        }

        /* Form Container (Using .table-card logic for consistent UI) */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
        }

        .form-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            height: 38px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-primary);
            transition: all 0.15s;
        }

        .form-control:focus, .form-select:focus {
            background: #ffffff;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
            outline: none;
        }

        /* Button override to match .btn-add/btn-search from source */
        .btn-custom-primary {
            height: 38px;
            padding: 0 1.5rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-custom-primary:hover {
            background: #1d4ed8;
        }

        .btn-custom-secondary {
            height: 38px;
            padding: 0 1.5rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-custom-secondary:hover {
            background: var(--bg);
            color: var(--text-primary);
        }

        .section-divider {
            height: 1px;
            background: var(--border);
            margin: 2rem 0;
        }
    </style>
</head>

<body>

<div class="topbar">
    <span class="topbar-brand">Customer Management</span>
</div>

<div class="page-wrapper">

    <div class="page-header">
        <h1 class="page-title">Add Customer</h1>
    </div>

    <div class="form-card">

        <form id="addForm">

            <div class="mb-4">
                <label class="form-label">Customer Name</label>
                <input type="text" id="customerName" class="form-control">
            </div>

            <div class="row mb-4">
                <div class="col">
                    <label class="form-label">First Name</label>
                    <input type="text" id="contactFirstName" class="form-control">
                </div>

                <div class="col">
                    <label class="form-label">Last Name</label>
                    <input type="text" id="contactLastName" class="form-control">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Phone</label>
                <input type="text" id="phone" class="form-control">
            </div>

            <div class="section-divider"></div>

            <div class="row mb-4">
                <div class="col">
                    <label class="form-label">Address Line 1</label>
                    <input type="text" id="addressLine1" class="form-control">
                </div>

                <div class="col">
                    <label class="form-label">Address Line 2</label>
                    <input type="text" id="addressLine2" class="form-control">
                </div>
            </div>

            <div class="row mb-4">
                <div class="col">
                    <label class="form-label">City</label>
                    <input type="text" id="city" class="form-control">
                </div>

                <div class="col">
                    <label class="form-label">Country</label>
                    <input type="text" id="country" class="form-control">
                </div>
            </div>

            <div class="row mb-4">
                <div class="col">
                    <label class="form-label">State</label>
                    <input type="text" id="state" class="form-control" placeholder="Optional">
                </div>

                <div class="col">
                    <label class="form-label">Postal Code</label>
                    <input type="text" id="postalCode" class="form-control" placeholder="Optional">
                </div>
            </div>

            <div class="section-divider"></div>

            <div class="mb-4">
                <label class="form-label">Credit Limit</label>
                <input type="number" id="creditLimit" class="form-control">
            </div>

            <div class="mb-5">
                <label class="form-label">Sales Representative</label>

                <select id="salesRepEmployeeNumber" class="form-select">
                    <option value="">Select Employee (Optional)</option>

                    <option th:each="emp : ${employees}"
                            th:value="${emp.employeeNumber}"
                            th:text="${emp.fullName}">
                    </option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button id="addBtn" type="button" class="btn-custom-primary" onclick="addCustomer()">
                    Add Customer
                </button>

                <button type="button" class="btn-custom-secondary" onclick="history.back()">
                    Cancel
                </button>
            </div>

        </form>

    </div>

</div>

<script th:inline="javascript">
    const BASE_URL = /*[[${@environment.getProperty('backend.base-url')}]]*/ '';
</script>

<script th:src="@{/js/add-customer.js}"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
